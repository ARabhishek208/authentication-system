{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<h1>Login Page</h1>

<p style="color:red;">
    {{ error }}
</p>

<form method="POST">

    {% csrf_token %}

    <input type="text"
           name="username"
           placeholder="Username">

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password">

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br>

<a href="/signup/">
    Create Account
</a>

</body>
</html>
